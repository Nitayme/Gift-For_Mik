<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הפתעה למיקה</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fff1f2,#ffe4e6,#fff7ed);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:92%;
max-width:900px;
background:white;
border-radius:24px;
padding:30px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

h1{color:#be185d}
.hidden{display:none}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px}

.card{
border:1px solid #fbcfe8;
border-radius:20px;
padding:20px;
cursor:pointer;
transition:.25s;
}

.card:hover{transform:scale(1.03)}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#e11d48;
color:white;
cursor:pointer;
}

button:hover{background:#be123c}
</style>
</head>

<body>

<div class="container">

<!-- מסך ראשון -->
<div id="startScreen">
<h1>מיקה, מה הכי היית רוצה לשבת הקרובה?</h1>

<div class="cards">

<div class="card" onclick="openFish()">🐟<br>ארוחת דגים</div>
<div class="card" onclick="openMovie()">🎬<br>ערב קולנוע</div>
<div class="card" onclick="openMassage()">💆<br>מסאז׳</div>

</div>
</div>

<!-- דגים -->
<div id="fishScreen" class="hidden">
<h1>ידעתי שתבחרי בדגים 😌</h1>

<p>איזה דג בא לך?</p>
<select id="fishType">
<option>סלמון</option>
<option>לברק</option>
<option>דניס</option>
</select>

<p>יין?</p>
<select id="wineType">
<option>אדום</option>
<option>לבן</option>
</select>

<br>
<button onclick="saveFish()">אישור</button>
</div>

<!-- סרט -->
<div id="movieScreen" class="hidden">
<h1>ידעתי שתבחרי סרט 🎬</h1>

<p>איזה סוג?</p>
<select id="movieType">
<option>ישראלי קלאסי</option>
<option>קומדיה רומנטית</option>
<option>מתח</option>
</select>

<p>מה אוכלים?</p>
<select id="snackType">
<option>פופקורן</option>
<option>נאצ׳וס</option>
</select>

<br>
<button onclick="saveMovie()">אישור</button>
</div>

<!-- מסאז -->
<div id="massageScreen" class="hidden">
<h1>ידעתי שתבחרי מסאז׳ 😌</h1>

<p>עוצמה?</p>
<select id="powerType">
<option>עדין</option>
<option>בינוני</option>
<option>חזק</option>
</select>

<p>אווירה?</p>
<select id="soundType">
<option>מוזיקה</option>
<option>שקט</option>
</select>

<br>
<button onclick="saveMassage()">אישור</button>
</div>

<!-- מסך סופי -->
<div id="finalScreen" class="hidden">

<h1>הבחירות שלך ❤️</h1>

<p id="summary"></p>

<div class="cards">
<div class="card" onclick="openFish()">🐟 לשנות דגים</div>
<div class="card" onclick="openMovie()">🎬 לשנות סרט</div>
<div class="card" onclick="openMassage()">💆 לשנות מסאז׳</div>
</div>

<button onclick="restart()">להתחיל מהתחלה</button>

</div>

</div>

<script>

let fish="",wine="",movie="",snack="",power="",sound="";

function hideAll(){
document.querySelectorAll(".container > div").forEach(e=>e.classList.add("hidden"));
}

function openFish(){hideAll();fishScreen.classList.remove("hidden")}
function openMovie(){hideAll();movieScreen.classList.remove("hidden")}
function openMassage(){hideAll();massageScreen.classList.remove("hidden")}

function saveFish(){
fish=fishType.value;
wine=wineType.value;
showFinal();
}

function saveMovie(){
movie=movieType.value;
snack=snackType.value;
showFinal();
}

function saveMassage(){
power=powerType.value;
sound=soundType.value;
showFinal();
}

function showFinal(){
hideAll();
finalScreen.classList.remove("hidden");

summary.innerHTML=
"🐟 דג: "+fish+" | יין: "+wine+"<br>"+
"🎬 סרט: "+movie+" | נשנוש: "+snack+"<br>"+
"💆 עוצמה: "+power+" | אווירה: "+sound;
}

function restart(){
location.reload();
}

</script>

</body>
</html>
